# Build chejooli-core and publish it to Artifactory on every tag push.
# Mirrors release.sh: `python -m build` (sdist + wheel) then `twine upload`.
stages:
  - publish

publish:
  stage: publish
  image: python:3.11-slim
  # Only run for tags, never for branch pushes or merge requests.
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - pip install --upgrade build twine
    - python -m build
    - >
      TWINE_USERNAME="$ARTIFACTORY_USERNAME"
      TWINE_PASSWORD="$ARTIFACTORY_TOKEN"
      TWINE_NON_INTERACTIVE=1
      twine upload --repository-url "https://repo.hsre.ir/artifactory/api/pypi/hpypi" dist/*
